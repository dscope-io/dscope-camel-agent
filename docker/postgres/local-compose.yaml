services:
  postgres:
    image: postgres:16
    container_name: camel-agent-pg-local
    restart: unless-stopped
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - camel-agent-pg-data:/var/lib/postgresql/data

volumes:
  camel-agent-pg-data: