camel:
  main:
    name: agent-support-service
    duration-max-idle-seconds: 0
  component:
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:}
      username: ${TWILIO_ACCOUNT_SID:}
      password: ${TWILIO_AUTH_TOKEN:}
  persistence:
    enabled: true
    backend: jdbc
    jdbc:
      url: jdbc:derby:memory:agent;create=true

spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://api.openai.com

openai:
  api:
    key: ${OPENAI_API_KEY}

agent:
  agents-config: classpath:agents/agents.yaml
  runtime:
    routes-include-pattern: classpath:routes/kb-search.camel.yaml,classpath:routes/kb-search-json.camel.xml,classpath:routes/ticket-service.camel.yaml,classpath:routes/ag-ui-platform.camel.yaml,classpath:routes/admin-platform.camel.yaml,classpath:routes/sip-adapter-platform.camel.yaml,classpath:routes/twilio-adapter-platform.camel.yaml,classpath:routes/twilio-management.camel.yaml,classpath:routes/openai-sip-support.camel.yaml
    agent-routes-enabled: true
    sample-agent-endpoint-uri: agent:ticketing?blueprint=classpath:agents/ticketing/v1/agent.md
    support:
      crm-mcp-endpoint-uri: mcp:https://${AGENT_SUPPORT_CRM_MCP_HOST:camel-crm-service-702748800338.europe-west1.run.app}/mcp
      agui-agent-endpoint-uri: agent:support?plansConfig={{agent.agents-config}}&blueprint={{agent.blueprint}}
    a2a:
      enabled: true
      public-base-url: http://localhost:{{agui.rpc.port:8080}}
      exposed-agents-config: classpath:agents/a2a-exposed-agents.yaml
    ai:
      mode: spring-ai
    realtime:
      processor-bean-name: supportRealtimeEventProcessorCore
      agent-endpoint-uri: agent:support?plansConfig={{agent.agents-config}}&blueprint={{agent.blueprint}}
      agent-profile-purpose-max-chars: 0
      resource-context-max-chars: 12000
      # Server-side TTL for browser WebRTC init context (conversationId -> session template)
      browser-session-ttl-ms: 600000
      prefer-core-token-processor: true
      require-init-session: true
      provider: openai
      model: gpt-4o-realtime-preview
      language: en
      voice: alloy
      transport: server-relay
      endpoint-uri: wss://api.openai.com/v1/realtime
      input-audio-format: pcm16
      output-audio-format: pcm16
      retention-policy: metadata_transcript
      reconnect:
        max-send-retries: 3
        max-reconnects: 8
        initial-backoff-ms: 150
        max-backoff-ms: 2000
    sip:
      bind-processors: true
    agui:
      pre-run:
        agent-endpoint-uri: agent:support?plansConfig={{agent.agents-config}}&blueprint={{agent.blueprint}}
        fallback-enabled: true
        fallback:
          kb-tool-name: kb.search
          ticket-tool-name: support.ticket.manage
          ticket-uri: direct:support-ticket-manage
          ticket-keywords: ticket,open,create,update,close,status,submit,escalate
          error-markers: api key is missing,openai api key,set -dopenai.api.key
    spring-ai:
      provider: openai
      # OpenAI api-mode:
      # - chat (default) -> Spring AI Chat Completions
      # - responses-http -> reserved (not yet implemented)
      # - responses-ws -> delegated to a pluggable OpenAiResponsesGateway
      api-mode: ${AGENT_OPENAI_API_MODE:chat}
      model: gpt-5.4
      temperature: 0.2
      max-tokens: 800
      openai:
        base-url: https://api.openai.com
        api-key-system-property: openai.api.key
        organization-system-property: openai.organization
        project-system-property: openai.project
        responses-ws:
          # Enable by switching api-mode to responses-ws.
          endpoint-uri: wss://api.openai.com/v1/responses
          model: gpt-5.4
          request-timeout-ms: 30000
          poll-interval-ms: 50
          max-send-retries: 3
          max-reconnects: 8
          initial-backoff-ms: 150
          max-backoff-ms: 2000
    chat:
      resource-context-max-chars: 64000
    telephony:
      openai:
        instructions: You are a support agent handling an outbound customer support call.
        project-id: ${OPENAI_PROJECT_ID:}
      twilio:
        from: ${TWILIO_FROM_NUMBER:}
      gemini:
        # Spring AI Gemini uses Vertex AI client in this module.
        model: gemini-2.5-flash
        vertex:
          project-id: ${GOOGLE_CLOUD_PROJECT}
          location: us-central1
      claude:
        base-url: https://api.anthropic.com/v1/messages
        model: claude-3-5-sonnet-20241022
        api-key-system-property: anthropic.api.key
        anthropic-version: "2023-06-01"
  blueprint: classpath:agents/support/agent.md
  sample:
    prompt: My login is failing, please open a support ticket
  audit:
    granularity: debug
    trail:
      limit: 200
    api:
      enabled: false
      host: 0.0.0.0
      port: 8080
  # Optional: use a dedicated persistence target for audit trail events only.
  # If these are omitted, audit trail uses the same persistence store as context/state.
  # audit:
  #   backend: jdbc
  #   jdbc:
  #     url: jdbc:postgresql://localhost:5432/agent_audit
  #     username: agent_audit_user
  #     password: ${AGENT_AUDIT_DB_PASSWORD}
  #     driver-class-name: org.postgresql.Driver
  # Alternative namespaced form is also supported:
  # audit:
  #   persistence:
  #     backend: jdbc
  #     jdbc:
  #       url: jdbc:postgresql://localhost:5432/agent_audit

agui:
  health:
    port: 8080
  rpc:
    port: 8080
