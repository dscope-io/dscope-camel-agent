camel:
  main:
    name: agent-support-service
    duration-max-idle-seconds: 0
  persistence:
    enabled: true
    backend: jdbc
    jdbc:
      url: jdbc:derby:memory:agent;create=true

spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://api.openai.com

agent:
  runtime:
    routes-include-pattern: classpath:routes/kb-search.camel.yaml,classpath:routes/kb-search-json.camel.xml,classpath:routes/ag-ui-platform.camel.yaml
    agent-routes-enabled: true
    ai:
      mode: spring-ai
    spring-ai:
      provider: openai
      # OpenAI mode in this Spring AI gateway: chat
      api-mode: chat
      model: gpt-4o-mini
      temperature: 0.2
      max-tokens: 800
      openai:
        base-url: https://api.openai.com
        api-key-system-property: openai.api.key
        organization-system-property: openai.organization
        project-system-property: openai.project
      gemini:
        # Spring AI Gemini uses Vertex AI client in this module.
        model: gemini-2.5-flash
        vertex:
          project-id: ${GOOGLE_CLOUD_PROJECT}
          location: us-central1
      claude:
        base-url: https://api.anthropic.com/v1/messages
        model: claude-3-5-sonnet-20241022
        api-key-system-property: anthropic.api.key
        anthropic-version: "2023-06-01"
  blueprint: classpath:agents/support/agent.md
  sample:
    prompt: My login is failing, please open a support ticket
  audit:
    granularity: debug
    trail:
      limit: 200
    api:
      enabled: false
      host: 0.0.0.0
      port: 8080
  # Optional: use a dedicated persistence target for audit trail events only.
  # If these are omitted, audit trail uses the same persistence store as context/state.
  # audit:
  #   backend: jdbc
  #   jdbc:
  #     url: jdbc:postgresql://localhost:5432/agent_audit
  #     username: agent_audit_user
  #     password: ${AGENT_AUDIT_DB_PASSWORD}
  #     driver-class-name: org.postgresql.Driver
  # Alternative namespaced form is also supported:
  # audit:
  #   persistence:
  #     backend: jdbc
  #     jdbc:
  #       url: jdbc:postgresql://localhost:5432/agent_audit

agui:
  health:
    port: 8080
  rpc:
    port: 8080
