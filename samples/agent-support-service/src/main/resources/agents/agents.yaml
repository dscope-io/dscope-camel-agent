plans:
  - name: support
    default: true
    ai:
      provider: openai
      properties:
        agent:
          runtime:
            spring-ai:
              openai:
                api-mode: responses-http
    versions:
      - version: v1
        default: true
        blueprint: classpath:agents/support/v1/agent.md
      - version: v2
        blueprint: classpath:agents/support/v2/agent.md
        ai:
          model: gpt-5.4-mini
          temperature: 0.3
          max-tokens: 700
          properties:
            agent:
              runtime:
                spring-ai:
                  openai:
                    prompt-cache:
                      enabled: true
  - name: calendar
    ai:
      provider: gemini
    versions:
      - version: v1
        blueprint: classpath:agents/calendar/v1/agent.md
      - version: v2
        default: true
        blueprint: classpath:agents/calendar/v2/agent.md
  - name: billing
    ai:
      provider: claude
    versions:
      - version: v1
        default: true
        blueprint: classpath:agents/billing/v1/agent.md
      - version: v2
        blueprint: classpath:agents/billing/v2/agent.md
  - name: ticketing
    versions:
      - version: v1
        default: true
        blueprint: classpath:agents/ticketing/v1/agent.md
