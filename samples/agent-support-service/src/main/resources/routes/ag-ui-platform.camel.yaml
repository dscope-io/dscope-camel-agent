- route:
    id: agui-agent-rpc-websocket
    from:
      id: fromAguiRpcWebsocket
      uri: undertow:ws://0.0.0.0:{{agui.rpc.port:8080}}/agui/rpc
      steps:
        - doTry:
            id: doTryAguiRpcWebsocket
            doCatch:
              - id: doCatchAguiRpcWebsocket
                exception:
                  - java.lang.Exception
                steps:
                  - process:
                      id: processAguiRpcWebsocketError
                      ref: agUiErrorProcessor
            steps:
              - process:
                  id: processAguiRpcWebsocketEnvelope
                  ref: agUiAgentEnvelopeProcessor
              - process:
                  id: processAguiRpcWebsocketRequest
                  ref: agUiAgentRequestProcessor
              - process:
                  id: processAguiRpcWebsocketBridge
                  ref: agUiPostSseBridgeProcessor
              - process:
                  id: processAguiRpcWebsocketSse
                  ref: agUiSseProcessor
              - to:
                  id: toAguiRpcWebsocketReply
                  uri: undertow:ws://0.0.0.0:{{agui.rpc.port:8080}}/agui/rpc?sendToAll=true
- route:
    id: agui-ui
    from:
      id: from67ef
      uri: undertow
      parameters:
        httpURI: http://0.0.0.0:{{agui.rpc.port:8080}}/agui/ui?httpMethodRestrict=GET
      steps:
        - setHeader:
            id: setHeaderUiContentType
            name: Content-Type
            constant: text/html; charset=UTF-8
        - setHeader:
            id: setHeaderUiCacheControl
            name: Cache-Control
            constant: no-store, no-cache, must-revalidate, max-age=0
        - setHeader:
            id: setHeaderUiPragma
            name: Pragma
            constant: no-cache
        - setHeader:
            id: setHeaderUiExpires
            name: Expires
            constant: 0
        - process:
            id: processUiResource
            ref: supportUiPageProcessor
