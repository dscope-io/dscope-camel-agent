- route:
    id: sample-audit-ui
    from:
      id: fromSampleAuditUi
      uri: undertow
      parameters:
        httpURI: http://0.0.0.0:{{agui.rpc.port:8080}}/audit/ui?httpMethodRestrict=GET
      steps:
        - pollEnrich:
            id: pollAuditUiPage
            simple: file:{{agui.ui.static-root:samples/agent-support-service/src/main/resources/frontend}}?fileName=audit.html&noop=true&idempotent=false
        - convertBodyTo:
            id: convertAuditUiToString
            type: java.lang.String
        - setHeader:
            id: setHeaderAuditUiContentType
            name: Content-Type
            constant: text/html; charset=UTF-8
        - setHeader:
            id: setHeaderAuditUiCacheControl
            name: Cache-Control
            constant: no-store, no-cache, must-revalidate, max-age=0
        - setHeader:
            id: setHeaderAuditUiPragma
            name: Pragma
            constant: no-cache
        - setHeader:
            id: setHeaderAuditUiExpires
            name: Expires
            constant: "0"
