- route:
    id: sample-kamelet-echo-smoke
    from:
      id: fromSampleKameletEchoSmoke
      uri: undertow
      parameters:
        httpURI: http://0.0.0.0:{{agui.rpc.port:8080}}/smoke/kamelet/echo?httpMethodRestrict=GET
      steps:
        - setBody:
            id: setBodySampleKameletEchoInput
            expression:
              simple:
                id: simpleSampleKameletEchoInput
                expression: ${header.query}
        - to:
            id: toSampleKameletEcho
            uri: kamelet:support-echo-sink/sink?prefix=SupportEcho
        - setHeader:
            id: setHeaderSampleKameletEchoContentType
            name: Content-Type
            constant: text/plain; charset=UTF-8

- route:
    id: sample-runtime-refresh-all
    from:
      id: fromSampleRuntimeRefreshAll
      uri: undertow
      parameters:
        httpURI: http://0.0.0.0:{{agui.rpc.port:8080}}/runtime/refresh?httpMethodRestrict=POST
      steps:
        - process:
            id: processSampleRuntimeRefreshAll
            ref: runtimeResourceRefreshProcessor

- route:
