- onException:
    exception:
      - java.lang.IllegalArgumentException
    handled:
      constant: "true"
    steps:
      - setHeader:
          name: CamelHttpResponseCode
          constant: "400"
      - setProperty:
          name: mcp.error.code
          constant: "-32600"
      - setProperty:
          name: mcp.error.message
          simple: "${exception.message}"
      - process:
          ref: mcpError

- route:
    id: sample-admin-mcp-api
    from:
      id: fromSampleAdminMcpApi
      uri: undertow
      parameters:
        httpURI: http://0.0.0.0:{{agui.rpc.port:8080}}/mcp/admin?httpMethodRestrict=POST
      steps:
        - process:
            id: processSampleAdminMcpRequestSize
            ref: mcpRequestSizeGuard
        - process:
            id: processSampleAdminMcpHttpValidator
            ref: mcpHttpValidator
        - process:
            id: processSampleAdminMcpRateLimit
            ref: mcpRateLimit
        - process:
            id: processSampleAdminMcpEnvelope
            ref: mcpJsonRpcEnvelope
        - choice:
            when:
              - simple: "${exchangeProperty.mcp.jsonrpc.type} == 'NOTIFICATION'"
                steps:
                  - process:
                      id: processSampleAdminMcpNotification
                      ref: mcpNotification
                  - choice:
                      when:
                        - simple: "${exchangeProperty.mcp.notification.type} == 'initialized'"
                          steps:
                            - process:
                                id: processSampleAdminMcpNotificationsInitialized
                                ref: mcpNotificationsInitialized
                      otherwise:
                        steps:
                          - process:
                              id: processSampleAdminMcpNotificationAck
                              ref: mcpNotificationAck
              - simple: "${exchangeProperty.mcp.jsonrpc.method} == 'initialize'"
                steps:
                  - process:
                      id: processSampleAdminMcpInitialize
                      ref: mcpInitialize
              - simple: "${exchangeProperty.mcp.jsonrpc.method} == 'ping'"
                steps:
                  - process:
                      id: processSampleAdminMcpPing
                      ref: mcpPing
              - simple: "${exchangeProperty.mcp.jsonrpc.method} == 'tools/list'"
                steps:
                  - process:
                      id: processSampleAdminMcpToolsList
                      ref: mcpToolsList
              - simple: "${exchangeProperty.mcp.jsonrpc.method} == 'tools/call'"
                steps:
                  - process:
                      id: processSampleAdminMcpToolsCall
                      ref: mcpToolsCall
              - simple: "${exchangeProperty.mcp.jsonrpc.method} == 'resources/list'"
                steps:
                  - process:
                      id: processSampleAdminMcpResourcesList
                      ref: mcpResourcesList
              - simple: "${exchangeProperty.mcp.jsonrpc.method} == 'resources/read'"
                steps:
                  - process:
                      id: processSampleAdminMcpResourcesRead
                      ref: mcpResourcesRead
              - simple: "${exchangeProperty.mcp.jsonrpc.method} == 'ui/initialize'"
                steps:
                  - process:
                      id: processSampleAdminMcpUiInitialize
                      ref: mcpUiInitialize
              - simple: "${exchangeProperty.mcp.jsonrpc.method} == 'ui/message'"
                steps:
                  - process:
                      id: processSampleAdminMcpUiMessage
                      ref: mcpUiMessage
              - simple: "${exchangeProperty.mcp.jsonrpc.method} == 'ui/update-model-context'"
                steps:
                  - process:
                      id: processSampleAdminMcpUiUpdateModelContext
                      ref: mcpUiUpdateModelContext
              - simple: "${exchangeProperty.mcp.jsonrpc.method} == 'ui/tools/call'"
                steps:
                  - doTry:
                      steps:
                        - process:
                            id: processSampleAdminMcpUiToolsCall
                            ref: mcpUiToolsCall
                        - process:
                            id: processSampleAdminMcpUiToolsCallDelegate
                            ref: mcpToolsCall
                        - process:
                            id: processSampleAdminMcpUiToolsCallPost
                            ref: mcpUiToolsCallPost
                      doCatch:
                        - exception:
                            - java.lang.Exception
                          steps:
                            - process:
                                id: processSampleAdminMcpUiToolsCallPostOnError
                                ref: mcpUiToolsCallPost
                            - setProperty:
                                name: mcp.error.code
                                constant: "-32603"
                            - setProperty:
                                name: mcp.error.message
                                simple: "Tool execution failed: ${exception.message}"
                            - process:
                                id: processSampleAdminMcpUiToolsCallError
                                ref: mcpError
            otherwise:
              steps:
                - setProperty:
                    name: mcp.error.code
                    constant: "-32601"
                - setProperty:
                    name: mcp.error.message
                    simple: "Unsupported MCP method: ${exchangeProperty.mcp.jsonrpc.method}"
                - process:
                    id: processSampleAdminMcpUnsupported
                    ref: mcpError

