agent:
  runtime:
    routes-include-pattern: classpath:routes/ag-ui-static-only-test.camel.yaml
    agent-routes-enabled: false
    agui:
      bind-default-beans: true
      bind-pre-run-processor: true
    realtime:
      bind-relay: false
      bind-processor: false
      bind-token-processor: false

agui:
  ui:
    static-root: src/main/resources/frontend
